schema_version: 1

context:
  version: "0.19.0"
  sha256: 46e1b2d71343d14e4c07d7e60902e673c78defb9a2c282b70ad80fb8502ade2e
  python_min: "3.8"

package:
  name: scikit-build
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scikit-build/scikit_build-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv
  files:
    exclude:
      - tests/samples/issue-401-sdist-with-symlinks/VERSION

requirements:
  host:
    - hatch-fancy-pypi-readme
    - hatch-vcs
    - hatchling
    - pip
    - python ${{ python_min }}.*
  run:
    - distro
    - packaging
    - python >=${{ python_min }}
    - setuptools
    - tomli
    - typing-extensions

tests:
  - python:
      imports:
        - skbuild
      python_version: ${{ python_min }}.*
      pip_check: true
  - files:
      source:
        - tests/*
        - pyproject.toml
    requirements:
      run:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - cython
        - git
        - make
        - path.py
        - pip
        - pytest
        - pytest-cov
        - pytest-mock
        - requests
        - setuptools
        - virtualenv
        - wheel
        - python ${{ python_min }}.*
    script:
      file: run_test

about:
  license: MIT
  license_file: LICENSE
  summary: Improved build system generator for CPython C extensions.
  homepage: http://github.com/scikit-build/scikit-build
  repository: http://github.com/scikit-build/scikit-build
  documentation: http://scikit-build.readthedocs.org

extra:
  recipe-maintainers:
    - isuruf
    - scopatz
    - jcfr
    - msarahan
    - henryiii
    - mayeut
